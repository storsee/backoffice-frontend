<main>
    <div class="popup-main">
        <div class="popup-head">
            <div class="popup-head-ttl">{{nextStatus == 2 ? 'Approve' : 'Reject'}} Ticket Reason</div>
            <div class="popup-head-btn">
                <button (click)="activeModal.close()"><i class="fa-solid fa-x"></i></button>
            </div>
        </div>
        <div class="popup-body">
            <div class="row m-0 p-0">
                <div class="col-12 mb-2">
                    <div class="form-inp-main">
                        <label class="form-label">{{nextStatus == 2 ? 'Approve' : 'Reject'}} Ticket Reason</label>
                        <st-editor [(ngModel)]="data.answer" [config]="editorConfig"></st-editor>
                    </div>
                </div>
            </div>
        </div>
        <div class="popup-footer">
            <button type="button" class="site-btn grey-color" (click)="activeModal.close()" [disabled]="isSaving">Close</button>
            <button type="button" class="site-btn primary-color ms-1" (click)="updateStatus()" [appBtnLoading]="isSaving" [disabled]="isSaving">
                <span class="site-btn-icon"><i class="fa-solid fa-check"></i></span>
                {{nextStatus == 2 ? 'Approve' : 'Reject'}} Ticket
            </button>
        </div>
    </div>
</main>
