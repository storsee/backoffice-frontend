<app-breadcrumb [pageName]="sharedservice.pageName" [icon]="sharedservice.pageDetail?.icon" />
@if(isDataLoaded){
    <div class="page-table-main">
        <div class="row m-0 p-0">
            <div class="col-lg-6 col-12 mb-2">
                <div class="form-inp-main">
                    <label class="form-label">Razorpay Key ID</label>
                        <input class="form-control" type="text" placeholder="Enter Razorpay Key ID" [(ngModel)]="paymentsetting.rzp_keyId" />
                </div>
            </div>
            <div class="col-lg-6 col-12 mb-2">
                <div class="form-inp-main">
                    <label class="form-label">Razorpay Key Secret</label>
                        <input class="form-control" type="text" placeholder="Enter Razorpay Key Secret" [(ngModel)]="paymentsetting.rzp_keySecret" />
                </div>
            </div>
            <div class="col-12">
                <div class="popup-footer">
                    <button type="button" class="site-btn primary-color ms-1" (click)="updateSetting()" [appBtnLoading]="isSaving" [disabled]="isSaving">
                        <span class="site-btn-icon"><i class="fa-solid fa-check"></i></span>
                        Update
                    </button>
                </div>
            </div>
        </div>
    </div>
}
