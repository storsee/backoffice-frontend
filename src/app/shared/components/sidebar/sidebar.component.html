<div class="sidebar">
  <nav class="sidebar-nav">
    <!-- Dashboard direct link (always visible) -->
    <a
      class="nav-item"
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="sharedservice.isSidebarOpen = false">
      <span class="nav-item-icon"><i class="fa-solid fa-house"></i></span>
      <span class="nav-item-label">Dashboard</span>
    </a>

    <!-- Dynamic groups from sidebarPages -->
    @for(group of sharedservice.sidebarPages; track group.category){
      @if(group.pages?.length > 0){
        <div class="nav-group" [class.is-expanded]="isExpanded(group.category)">
          <button
            type="button"
            class="nav-item nav-parent"
            [class.active]="isGroupActive(group.pages)"
            (click)="toggleGroup(group.category, group.pages)">
            <span class="nav-item-icon">
              <i class="fa-solid fa-{{ group.pages[0]?.icon || 'folder' }}"></i>
            </span>
            <span class="nav-item-label">{{ group.category }}</span>
            <span class="nav-item-chevron">
              <span class="nav-item-chevron-icon">
                <i class="fa-solid fa-chevron-right"></i>
              </span>
            </span>
          </button>

          @if(isExpanded(group.category)){
            <div class="nav-sub-list">
              @for(page of group.pages; track page.url){
                <a
                  class="nav-sub-item"
                  [routerLink]="page.url"
                  routerLinkActive="active"
                  (click)="sharedservice.isSidebarOpen = false">
                  {{ page.pagename }}
                </a>
              }
            </div>
          }
        </div>
      }
    }
  </nav>

  <div class="sidebar-bottom">
    <button type="button" class="nav-item nav-item--logout" (click)="logout()">
      <span class="nav-item-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
      <span class="nav-item-label">Logout</span>
    </button>
  </div>
</div>
